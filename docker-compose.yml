services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    command: uvicorn openclaw.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - projectdata:/data/projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Light tier: CEO, PM, Inbound, Outbound, Comms, Research, Learning + autoscaler
  workers-light:
    build: .
    command: python -m openclaw.agents.worker --tier light
    env_file: .env
    volumes:
      - projectdata:/data/projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Heavy tier: Designer, Engineer, QA (scale with --scale workers-heavy=N)
  workers-heavy:
    build: .
    command: python -m openclaw.agents.worker --tier heavy
    env_file: .env
    volumes:
      - projectdata:/data/projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ClawdBot — WhatsApp personal account bridge
  clawdbot:
    build: ./clawdbot
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - clawdbot_auth:/app/auth_state
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  projectdata:
  clawdbot_auth:

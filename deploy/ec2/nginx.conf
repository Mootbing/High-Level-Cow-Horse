# =============================================================================
# OpenClaw — Nginx Reverse Proxy Configuration
#
# Install:
#   sudo cp deploy/ec2/nginx.conf /etc/nginx/sites-available/openclaw
#   sudo ln -sf /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/openclaw
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after nginx is running):
#   sudo certbot --nginx -d your-domain.com
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;

# ---------------------------------------------------------------------------
# Upstream — FastAPI on port 8000
# ---------------------------------------------------------------------------
upstream openclaw_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP — redirect to HTTPS (once SSL is configured)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge (needed for certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Before SSL is set up, proxy directly. After certbot runs, it will
    # add a redirect block here automatically.
    location / {
        proxy_pass http://openclaw_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

